    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>File Upload</h1>
    <form id="uploadForm">
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <br><br>
        <label for="fileInput">Choose a file:</label>
        <input type="file" id="fileInput" required>
        <br><br>
        <button type="submit">Upload</button>
    </form>
    
    <div style="text-align: center; margin-top: 30px;">
        <button id="browseNgrokBtn" type="button">Browse to Ngrok with Directory Listing</button>
    </div>
    
    <div id="response"></div>
    <div id="scrollingText">Welcome to the Hacker Interface!</div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const password = document.getElementById('password').value;
            const file = fileInput.files[0];

            if (!file || !password) {
                alert('Please provide a file and password');
                return;
            }

            const reader = new FileReader();
            reader.onload = async () => {
                const ws = new WebSocket('ws://localhost:8080');
                ws.onopen = () => {
                    ws.send(JSON.stringify({
                        password: password,
                        filename: file.name,
                        file: reader.result.split(',')[1] // Remove Base64 header
                    }));
                };
                ws.onmessage = (event) => {
                    document.getElementById('response').innerText = event.data;
                };
            };
            reader.readAsDataURL(file);
        });

        // Handle ngrok browse button
        document.getElementById('browseNgrokBtn').addEventListener('click', async () => {
            const password = document.getElementById('password').value;
            
            if (!password) {
                alert('Please enter the password first');
                return;
            }
            
            const ws = new WebSocket('ws://localhost:8080');
            ws.onopen = () => {
                ws.send(JSON.stringify({
                    password: password,
                    action: "browse_ngrok"
                }));
            };
            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                if (response.status === "success") {
                    document.getElementById('response').innerHTML = 
                        `<strong>Success!</strong><br>
                         URL: ${response.url}<br>
                         Response: ${response.response || 'Request completed'}`;
                } else {
                    document.getElementById('response').innerHTML = 
                        `<strong>Error:</strong> ${response.message}<br>
                         URL: ${response.url || 'N/A'}`;
                }
                ws.close();
            };
            ws.onerror = () => {
                document.getElementById('response').innerText = 'WebSocket connection failed';
            };
        });
    </script>
</body>
</html>
