<body>
    <h1>File Upload</h1>
    <div id="userInfo" style="text-align: center; margin-bottom: 20px; color: #00ff00; font-size: 1.2rem;"></div>
    <form id="uploadForm">
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <br><br>
        <label for="fileInput">Choose a file:</label>
        <input type="file" id="fileInput" required>
        <br><br>
        <button type="submit">Upload</button>
    </form>
    <div id="response"></div>
    <div id="scrollingText">Welcome to the Hacker Interface!</div>
    <script>
        // Extract username from URL parameter
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Display username if provided
        const username = getUrlParameter('param1');
        const userInfoDiv = document.getElementById('userInfo');
        if (username) {
            userInfoDiv.innerHTML = `Welcome, <strong>${username}</strong>!`;
        } else {
            userInfoDiv.innerHTML = 'Welcome, Guest!';
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const password = document.getElementById('password').value;
            const file = fileInput.files[0];

            if (!file || !password) {
                alert('Please provide a file and password');
                return;
            }

            const reader = new FileReader();
            reader.onload = async () => {
                const ws = new WebSocket('ws://localhost:8080');
                ws.onopen = () => {
                    const uploadData = {
                        password: password,
                        filename: file.name,
                        filedata: reader.result.split(',')[1] // Remove Base64 header
                    };
                    
                    // Include username if available
                    if (username) {
                        uploadData.username = username;
                    }
                    
                    ws.send(JSON.stringify(uploadData));
                };
                ws.onmessage = (event) => {
                    document.getElementById('response').innerText = event.data;
                };
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
