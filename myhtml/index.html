<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <style>
        body {
            background-color: black; /* Black background */
            color: neon-green; /* Green text */
            font-family: 'Courier New', Courier, monospace; /* Monospace font */
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-top: 20px;
            animation: blink 1s infinite;
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 30px;
            color: neon-green;
        }

        @keyframes blink {
!``

            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        form {
            text-align: center;
            margin-top: 50px;
        }

        input, button {
            font-size: 1rem;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: neon-green;
        }

        input[type="file"] {
            color: neon-green;
        }

        #response {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
            padding: 15px;
            background: #111;
            border-radius: 5px;
            min-height: 50px;
            border: 1px solid #333;
        }

        /* Scrolling text animation */
        @keyframes scroll {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }

        #scrollingText {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            animation: scroll 10s linear infinite;
            color: neon-green;
        }
    </style>
</head>
<body>
    <h1>File Upload & Website Summarizer</h1>
    
    <!-- File Upload Section -->
    <form id="uploadForm">
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <br><br>
        <label for="fileInput">Choose a file:</label>
        <input type="file" id="fileInput" required>
        <br><br>
        <button type="submit">Upload</button>
    </form>
    
    <!-- Website Summarizer Section -->
    <form id="summarizeForm">
        <h2>Website Summarizer</h2>
        <label for="summarizePassword">Password:</label>
        <input type="password" id="summarizePassword" required>
        <br><br>
        <label for="urlInput">Website URL:</label>
        <input type="url" id="urlInput" placeholder="https://example.com" required>
        <br><br>
        <button type="submit">Summarize</button>
    </form>
    
    <div id="response"></div>
    <div id="scrollingText">Welcome to the Hacker Interface!</div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const password = document.getElementById('password').value;
            const file = fileInput.files[0];

            if (!file || !password) {
                alert('Please provide a file and password');
                return;
            }

            const reader = new FileReader();
            reader.onload = async () => {
                const ws = new WebSocket('ws://localhost:8080');
                ws.onopen = () => {
                    ws.send(JSON.stringify({
                        password: password,
                        filename: file.name,
                        filedata: reader.result.split(',')[1] // Remove Base64 header
                    }));
                };
                ws.onmessage = (event) => {
                    const response = JSON.parse(event.data);
                    if (response.status === 'success') {
                        document.getElementById('response').innerHTML = `<span style="color: green;">✅ ${response.message}</span>`;
                    } else {
                        document.getElementById('response').innerHTML = `<span style="color: red;">❌ ${response.message}</span>`;
                    }
                };
                ws.onerror = () => {
                    document.getElementById('response').innerHTML = '<span style="color: red;">❌ WebSocket connection failed</span>';
                };
            };
            reader.readAsDataURL(file);
        });

        // Website Summarizer Form Handler
        document.getElementById('summarizeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Summarize form submitted');
            
            const password = document.getElementById('summarizePassword').value;
            const url = document.getElementById('urlInput').value;

            if (!password || !url) {
                alert('Please provide both password and URL');
                return;
            }

            console.log('Connecting to WebSocket...');
            document.getElementById('response').innerHTML = '<span style="color: yellow;">🔄 Fetching and summarizing content...</span>';

            const ws = new WebSocket('ws://localhost:8080');
            
            ws.onopen = () => {
                console.log('WebSocket connected, sending request');
                ws.send(JSON.stringify({
                    password: password,
                    action: 'summarize',
                    url: url
                }));
            };
            
            ws.onmessage = (event) => {
                console.log('Received response:', event.data);
                const response = JSON.parse(event.data);
                if (response.status === 'success') {
                    document.getElementById('response').innerHTML = `
                        <div style="color: green; margin-top: 20px;">
                            <h3>✅ Summary for: ${response.url}</h3>
                            <p style="background: #222; padding: 15px; border-radius: 5px; margin: 10px 0; text-align: left; max-width: 800px; margin-left: auto; margin-right: auto;">
                                ${response.summary}
                            </p>
                        </div>
                    `;
                } else {
                    document.getElementById('response').innerHTML = `<span style="color: red;">❌ ${response.message}</span>`;
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('response').innerHTML = '<span style="color: red;">❌ WebSocket connection failed</span>';
            };
            
            ws.onclose = () => {
                console.log('WebSocket connection closed');
            };
        });
    </script>
</body>
</html>
